spring.application.name=smartcampus

# Server
server.port=8083

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/smartcampus_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Lukshan

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Format SQL
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# JWT (dev/demo)
app.jwt.secret=change_me_to_a_long_random_secret
app.jwt.issuer=smartcampus

# Logging
logging.level.com.smartcampus=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

