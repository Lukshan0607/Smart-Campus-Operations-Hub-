spring.application.name=smartcampus

# Server — only one `spring-boot:run` at a time (VS Code + Cursor both count); second bind fails on this port.
server.port=8083

# MySQL (defaults: tutorial-style root/root123). Override password via env SPRING_DATASOURCE_PASSWORD or optional file imported at end of this file.
spring.datasource.url=jdbc:mysql://localhost:3308/smartcampus_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA — explicit dialect avoids a second Hibernate error if JDBC metadata cannot be read (e.g. auth failure)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# JWT (dev/demo)
app.jwt.secret=change_me_to_a_long_random_secret
app.jwt.issuer=smartcampus

# Logging
logging.level.com.smartcampus=DEBUG

# Optional overrides (gitignored): copy config/local.properties.example to config/local.properties — imported last so it wins over values above.
spring.config.import=optional:file:./config/local.properties

