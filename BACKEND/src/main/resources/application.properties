spring.application.name=smartcampus

# Server
server.port=8083

# MySQL (when using docker-compose)
spring.datasource.url=jdbc:mysql://localhost:3306/smartcampus_db
spring.datasource.username=smartuser
spring.datasource.password=S3cur3P@ss

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Format SQL
spring.jpa.properties.hibernate.format_sql=false

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# JWT (dev/demo)
app.jwt.secret=change_me_to_a_long_random_secret
app.jwt.issuer=smartcampus

# Logging
logging.level.com.smartcampus=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

