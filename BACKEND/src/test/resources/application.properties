# Keep Spring Boot banner ON in tests (shows version once)
spring.main.banner-mode=console

# Keep test output readable
logging.level.root=INFO
logging.level.com.smartcampus=INFO

# Use in-memory DB for tests (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:smartcampus_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=root123
spring.jpa.hibernate.ddl-auto=create-drop

# JWT placeholder for JwtAuthFilter
app.jwt.secret=test_secret

